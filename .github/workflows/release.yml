name: Release

on:
  push:
    branches:
      - main

env:
  ArtifactsDirectory: ${{github.workspace}}/artifacts

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=Integration & Category!=WixIntegration"

      - name: Publish
        run: >-
          dotnet publish src/CsvLoader/CsvLoader.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ needs.version.outputs.semVer }}
          -p:AssemblyVersion=${{ needs.version.outputs.assemblySemVer }}
          -p:FileVersion=${{ needs.version.outputs.assemblySemFileVer }}
          -p:InformationalVersion="${{ needs.version.outputs.informationalVersion }}"
          -o ${{ env.ArtifactsDirectory }}/${{ matrix.rid }}
          
      # Upload exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zipped-${{ matrix.rid }}
          path: ${{ env.ArtifactsDirectory }}

  windows-release:
    needs: [version, build]
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: Zipped-win-x64
          path: ${{github.workspace}}\dnl
          merge-multiple: true

      - name: Show
        run: |
          Get-ChildItem -Path ${{github.workspace}}\dnl -Recurse

      - name: Create artifacts directory
        run: |
          New-Item -ItemType Directory -Path ${{github.workspace}}\artifacts -Force

      - name: Copy
        run: |
          cp -r ${{github.workspace}}\dnl\win-x64\* ${{github.workspace}}\artifacts\

      - name: Show2
        run: |
          Get-ChildItem -Path ${{github.workspace}} -Recurse

      - name: Install Advanced Installer
        uses: caphyon/advinst-github-action@main
        with:
          advinst-enable-automation: 'true'
          
      - name: Build MSI
        run: |
          .\update_aip.gha.ps1 ${{ needs.version.outputs.semVer }}
      
      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: >-
          Compress-Archive
          -Path ${{github.workspace}}\artifacts\*
          -DestinationPath ${{github.workspace}}\installer\SqlApiCli-${{ needs.version.outputs.semVer }}-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{github.workspace}}\installer\

  linux-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: Zipped-linux-x64
          path: ${{github.workspace}}/dnl
          merge-multiple: true

      - name: Show
        run: |
          ls -R ${{github.workspace}}/dnl

      - name: Zip artifact (Unix)
        if: runner.os != 'Windows'
        run: >-
          zip SqlApiCli-${{ needs.version.outputs.semVer }}-linux-x64.zip
          -j ${{github.workspace}}/dnl/linux-x64/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: SqlApiCli-${{ needs.version.outputs.semVer }}-linux-x64.zip

  release:
    needs: [version, windows-release, linux-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ${{github.workspace}}/dnl
          merge-multiple: true

      - name: Download linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: ${{github.workspace}}/dnl
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semVer }}
          name: v${{ needs.version.outputs.semVer }}
          files: ${{github.workspace}}/dnl/*
          generate_release_notes: true
