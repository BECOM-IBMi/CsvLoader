name: Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          # - os: ubuntu-latest
          #   rid: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=Integration"

      - name: Publish
        run: >-
          dotnet publish src/CsvLoader/CsvLoader.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ needs.version.outputs.semVer }}
          -p:AssemblyVersion=${{ needs.version.outputs.assemblySemVer }}
          -p:FileVersion=${{ needs.version.outputs.assemblySemFileVer }}
          -p:InformationalVersion="${{ needs.version.outputs.informationalVersion }}"
          -o publish/${{ matrix.rid }}

      # WiX Windows Installer build - Windows runner only
      # Generates MSI from the published binaries + WiX source (Product.wxs)
      # ProductVersion injected from GitVersion for semantic versioning
      # PublishDir points to the dotnet publish output directory
      - name: Build WiX MSI (Windows only)
        if: runner.os == 'Windows'
        run: >-
          dotnet build src/CsvLoaderInstaller/CsvLoaderInstaller.wixproj
          -c Release
          -p:PublishDir="${{ github.workspace }}\publish\${{ matrix.rid }}"
          -p:ProductVersion="${{ needs.version.outputs.semVer }}"

      # Verify the MSI was created - fail fast if build succeeded but output is missing
      # This prevents silent failures where the WiX build appears to succeed but produces no artifact
      - name: Verify MSI artifact exists
        if: runner.os == 'Windows'
        run: |
          $msiPath = "src\CsvLoaderInstaller\bin\Release\en-US\SqlApiCliInstaller.msi"
          if (-not (Test-Path $msiPath)) {
            Write-Error "MSI build completed but artifact not found at $msiPath" -ErrorAction Stop
          }
          Write-Output "MSI verified: $msiPath"

      # Rename MSI to match ZIP naming convention: SqlApiCli-{version}-windows-x64.msi
      # This ensures consistent artifact naming across platform-specific deliverables
      - name: Rename MSI artifact (Windows only)
        if: runner.os == 'Windows'
        run: >-
          Copy-Item
          -Path "src\CsvLoaderInstaller\bin\Release\en-US\SqlApiCliInstaller.msi"
          -Destination "SqlApiCli-${{ needs.version.outputs.semVer }}-${{ matrix.rid }}.msi"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: >-
          Compress-Archive
          -Path publish\${{ matrix.rid }}\SqlApiCli.exe
          -DestinationPath SqlApiCli-${{ needs.version.outputs.semVer }}-${{ matrix.rid }}.zip

      - name: Zip artifact (Unix)
        if: runner.os != 'Windows'
        run: >-
          zip SqlApiCli-${{ needs.version.outputs.semVer }}-${{ matrix.rid }}.zip
          -j publish/${{ matrix.rid }}/SqlApiCli

      # Upload ZIP as before
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SqlApiCli-${{ needs.version.outputs.semVer }}-${{ matrix.rid }}
          path: SqlApiCli-${{ needs.version.outputs.semVer }}-${{ matrix.rid }}.zip

      # Upload MSI as separate artifact (Windows only)
      # Tagged for easy identification as an installer
      - name: Upload MSI artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SqlApiCli-${{ needs.version.outputs.semVer }}-installer
          path: SqlApiCli-${{ needs.version.outputs.semVer }}-${{ matrix.rid }}.msi

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Create GitHub Release with all artifacts (ZIP + MSI)
      # Files glob expanded to include both binary ZIPs and installer MSI
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semVer }}
          name: v${{ needs.version.outputs.semVer }}
          files: artifacts/*
          generate_release_notes: true
